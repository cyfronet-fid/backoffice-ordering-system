name: backend_lint
run-name: ${{ github.actor }} is running a backend lint job...
on: [push]
jobs:
  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "./backend"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: "python -m pip install poetry"
      - run: "poetry install"
      - run: "poetry run lint"