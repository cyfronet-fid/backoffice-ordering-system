name: backend_test
run-name: ${{ github.actor }} is running a backend test job...
on: [push]
jobs:
  pytest:
    runs-on: ubuntu-latest
    container: python:3.12

    services:
      postgres-db-bos:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: pg
          POSTGRES_USER: pg
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: "./backend"

    env:
      DB_HOST: postgres-db-bos
      DB_PORT: 5432
      DB_USER: pg
      DB_PASSWORD: pg
      DB_NAME: postgres
      
      API_KEY: test-api-key
      KEYCLOAK_HOST: https://keycloak.docker-fid.grid.cyf-kr.edu.pl
      KEYCLOAK_REALM: core
      KEYCLOAK_CLIENT_ID: bos

    steps:
      - uses: actions/checkout@v4
      - run: "python -m pip install poetry"
      - run: "poetry install"
      - run: "poetry run alembic upgrade head"
      - run: "poetry run pytest"

