name: backend_test
run-name: ${{ github.actor }} is running a backend test job...
on: [push]
jobs:
  pytest:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "./backend"

    env:
      API_KEY: test-api-key
      KEYCLOAK_HOST: https://keycloak.docker-fid.grid.cyf-kr.edu.pl
      KEYCLOAK_REALM: core
      KEYCLOAK_CLIENT_ID: bos

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: "python -m pip install poetry"
      - run: "poetry install"
      - name: "Run unit tests"
        run: "poetry run pytest tests/models/ -v"
      - name: "Run integration tests"
        run: "poetry run pytest tests/integration/ -v"
      - name: "Run E2E tests"
        run: "poetry run pytest tests/e2e/ -v"

